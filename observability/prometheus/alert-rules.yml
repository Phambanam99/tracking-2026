groups:
  - name: tracking-alerts
    rules:
      - alert: HighIngestionLatency
        expr: histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{uri="/api/v1/ingest"}[5m])) by (le)) > 0.005
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Ingestion p95 latency > 5ms"
