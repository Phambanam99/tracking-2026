server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576
    timeout: 10s
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

scrape_configs:
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project"]

    relabel_configs:
      # Keep only tracking project containers
      - source_labels:
          [__meta_docker_container_label_com_docker_compose_project]
        regex: "tracking.*"
        action: keep

      # Set service label from container name
      - source_labels: [__meta_docker_container_name]
        regex: "/tracking-(.*)"
        target_label: service
        replacement: "$1"

      # Set container label
      - source_labels: [__meta_docker_container_name]
        target_label: container
        regex: "/(.*)"
        replacement: "$1"

      # Set compose service label
      - source_labels:
          [__meta_docker_container_label_com_docker_compose_service]
        target_label: compose_service

      # Stream label
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream

      # Job label = tracking
      - replacement: tracking
        target_label: job

    pipeline_stages:
      # Try to parse JSON structured logs (Spring Boot 3.4 format)
      - json:
          expressions:
            level: level
            logger: logger_name
            message: message
            trace_id: trace_id
            span_id: span_id
            thread: thread_name
            timestamp: "@timestamp"
          drop_malformed: false

      # Set level label from parsed JSON
      - labels:
          level:
          logger:
          trace_id:

      # Drop DEBUG logs in production (comment out to enable debug log ingestion)
      # - drop:
      #     source: level
      #     expression: "DEBUG"

      # Timestamp from JSON if available, else use ingestion time
      - timestamp:
          source: timestamp
          format: RFC3339Nano
          action_on_failure: skip

      # Output is the message field or raw line
      - output:
          source: message
