gateway:
  service:
    type: LoadBalancer
  replicaCount: 3
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi
  pdb:
    enabled: true
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 8
    targetCPUUtilizationPercentage: 65
    targetMemoryUtilizationPercentage: 75

ingress:
  enabled: true
  hosts:
    - host: tracking.example.com
      paths:
        - path: /
          pathType: Prefix

