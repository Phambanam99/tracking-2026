fullnameOverride: ""

global:
  imagePullPolicy: IfNotPresent
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    fsGroup: 10001
  probes:
    startup:
      enabled: true
      path: /actuator/health
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 30
    liveness:
      path: /actuator/health
      periodSeconds: 15
      timeoutSeconds: 3
      failureThreshold: 5
    readiness:
      path: /actuator/health
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 6

config:
  create: true
  existingConfigMap: ""
  data:
    MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus"
    MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
    LOGGING_LEVEL_ROOT: "INFO"

secrets:
  create: false
  existingSecret: ""
  stringData: {}

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: tracking.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

networkPolicy:
  enabled: true
  gatewayIngressCidrs:
    - 0.0.0.0/0

gateway:
  replicaCount: 2
  image:
    repository: tracking/service-gateway
    tag: latest
  containerPort: 8080
  service:
    type: LoadBalancer
    port: 80
  metrics:
    enabled: true
  env:
    SPRING_PROFILES_ACTIVE: k8s
    SERVER_PORT: "8080"
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  pdb:
    enabled: false
    maxUnavailable: 1
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

auth:
  replicaCount: 2
  image:
    repository: tracking/service-auth
    tag: latest
  containerPort: 8081
  service:
    port: 8081
  metrics:
    enabled: true
  env:
    SPRING_PROFILES_ACTIVE: k8s
    SERVER_PORT: "8081"
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  pdb:
    enabled: false
    maxUnavailable: 1
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

ingestion:
  replicaCount: 2
  image:
    repository: tracking/service-ingestion
    tag: latest
  containerPort: 8082
  terminationGracePeriodSeconds: 30
  service:
    port: 8082
  metrics:
    enabled: true
  env:
    SPRING_PROFILES_ACTIVE: k8s
    SERVER_PORT: "8082"
    TRACKING_FEATURES_SHIP_ENABLED: "false"
    TRACKING_KAFKA_TOPICS_RAW_AIS: "raw-ais"
    TRACKING_INGESTION_SHIP_INGEST_PATH: "/api/v1/ingest/ais/**"
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi
  pdb:
    enabled: false
    maxUnavailable: 1
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

broadcaster:
  replicaCount: 2
  image:
    repository: tracking/service-broadcaster
    tag: latest
  containerPort: 8083
  service:
    port: 8083
  metrics:
    enabled: true
  env:
    SPRING_PROFILES_ACTIVE: k8s
    SERVER_PORT: "8083"
    TRACKING_FEATURES_SHIP_ENABLED: "false"
    TRACKING_BROADCASTER_SHIP_CONSUMER_ENABLED: "false"
    TRACKING_KAFKA_TOPICS_LIVE_AIS: "live-ais"
  resources:
    requests:
      cpu: 300m
      memory: 384Mi
    limits:
      cpu: "1"
      memory: 768Mi
  pdb:
    enabled: false
    maxUnavailable: 1
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

processing:
  replicaCount: 2
  image:
    repository: tracking/service-processing
    tag: latest
  containerPort: 8085
  service:
    port: 8085
  metrics:
    enabled: true
  env:
    SPRING_PROFILES_ACTIVE: k8s
    SERVER_PORT: "8085"
    TRACKING_FEATURES_SHIP_ENABLED: "false"
    TRACKING_PROCESSING_SHIP_CONSUMER_ENABLED: "false"
    TRACKING_PROCESSING_SHIP_STRICT_KEY_MATCH: "true"
    TRACKING_PROCESSING_SHIP_MAX_SPEED_KMH: "120.0"
    TRACKING_KAFKA_TOPICS_RAW_AIS: "raw-ais"
    TRACKING_KAFKA_TOPICS_LIVE_AIS: "live-ais"
    TRACKING_KAFKA_TOPICS_HISTORICAL_AIS: "historical-ais"
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi
  pdb:
    enabled: false
    maxUnavailable: 1
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

storage:
  replicaCount: 2
  image:
    repository: tracking/service-storage
    tag: latest
  containerPort: 8084
  service:
    port: 8084
  metrics:
    enabled: true
  env:
    SPRING_PROFILES_ACTIVE: k8s
    SERVER_PORT: "8084"
    TRACKING_FEATURES_SHIP_ENABLED: "false"
    TRACKING_STORAGE_SHIP_CONSUMER_ENABLED: "false"
    TRACKING_KAFKA_TOPICS_LIVE_AIS: "live-ais"
    TRACKING_KAFKA_TOPICS_HISTORICAL_AIS: "historical-ais"
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi
  pdb:
    enabled: false
    maxUnavailable: 1
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
