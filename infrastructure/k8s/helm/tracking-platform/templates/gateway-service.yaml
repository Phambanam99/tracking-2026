apiVersion: v1
kind: Service
metadata:
  name: {{ include "tracking-platform.componentName" (dict "root" . "component" "gateway") }}
  labels:
    {{- include "tracking-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: {{ .Values.gateway.service.type }}
  selector:
    {{- include "tracking-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
  ports:
    - name: http
      port: {{ .Values.gateway.service.port }}
      targetPort: http
