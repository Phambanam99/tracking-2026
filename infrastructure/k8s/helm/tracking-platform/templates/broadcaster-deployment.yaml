apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tracking-platform.componentName" (dict "root" . "component" "broadcaster") }}
  labels:
    {{- include "tracking-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: broadcaster
spec:
  replicas: {{ .Values.broadcaster.replicaCount }}
  selector:
    matchLabels:
      {{- include "tracking-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: broadcaster
  template:
    metadata:
      labels:
        {{- include "tracking-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: broadcaster
      {{- if .Values.broadcaster.metrics.enabled }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: {{ .Values.broadcaster.containerPort | quote }}
      {{- end }}
    spec:
      securityContext:
        {{- toYaml .Values.global.podSecurityContext | nindent 8 }}
      containers:
        - name: broadcaster
          image: "{{ .Values.broadcaster.image.repository }}:{{ .Values.broadcaster.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.broadcaster.containerPort }}
          {{- if or .Values.config.create .Values.config.existingConfigMap .Values.secrets.create .Values.secrets.existingSecret }}
          envFrom:
            {{- if or .Values.config.create .Values.config.existingConfigMap }}
            - configMapRef:
                name: {{ include "tracking-platform.configMapName" . }}
            {{- end }}
            {{- if or .Values.secrets.create .Values.secrets.existingSecret }}
            - secretRef:
                name: {{ include "tracking-platform.secretName" . }}
            {{- end }}
          {{- end }}
          {{- with .Values.broadcaster.env }}
          env:
            {{- range $key, $value := . }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
          {{- if .Values.global.probes.startup.enabled }}
          startupProbe:
            {{- include "tracking-platform.httpProbe" .Values.global.probes.startup | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- include "tracking-platform.httpProbe" .Values.global.probes.liveness | nindent 12 }}
          readinessProbe:
            {{- include "tracking-platform.httpProbe" .Values.global.probes.readiness | nindent 12 }}
          resources:
            {{- toYaml .Values.broadcaster.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tracking-platform.componentName" (dict "root" . "component" "broadcaster") }}
  labels:
    {{- include "tracking-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: broadcaster
spec:
  type: ClusterIP
  selector:
    {{- include "tracking-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: broadcaster
  ports:
    - name: http
      port: {{ .Values.broadcaster.service.port }}
      targetPort: http
