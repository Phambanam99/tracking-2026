{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ printf "%s-default-deny-ingress" (include "tracking-platform.fullname" .) | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "tracking-platform.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ printf "%s-allow-internal-namespace" (include "tracking-platform.fullname" .) | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "tracking-platform.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ printf "%s-gateway-public-ingress" (include "tracking-platform.fullname" .) | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "tracking-platform.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "tracking-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- if .Values.networkPolicy.gatewayIngressCidrs }}
        {{- range .Values.networkPolicy.gatewayIngressCidrs }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{- end }}
        {{- else }}
        - ipBlock:
            cidr: "0.0.0.0/0"
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.gateway.containerPort }}
{{- end }}
