spring:
  application:
    name: service-processing
  jackson:
    deserialization:
      fail-on-unknown-properties: false
  kafka:
    bootstrap-servers: ${TRACKING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: 1
      properties:
        batch.size: 131072
        linger.ms: 10
        compression.type: lz4
        buffer.memory: 67108864
        max.request.size: 10485760
        delivery.timeout.ms: 1000
        max.block.ms: 1000
        request.timeout.ms: 800

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        tracking.processing.pipeline.latency: true
        tracking.processing.enrichment.latency: true
        tracking.processing.kafka.publish.latency: true
      slo:
        tracking.processing.pipeline.latency: 5ms,10ms,25ms,50ms,100ms,250ms
        tracking.processing.enrichment.latency: 5ms,10ms,25ms,50ms,100ms,250ms
        tracking.processing.kafka.publish.latency: 5ms,10ms,25ms,50ms,100ms,250ms

tracking:
  kafka:
    topics:
      raw: raw-adsb
      live: live-adsb
      historical: historical-adsb
      invalidDlq: invalid-telemetry-dlq
  processing:
    consumer:
      group-id: service-processing-v1
      concurrency: 8
      strict-key-match: true
      retry:
        backoff-millis: 1000
        max-attempts: 3
    dedup:
      ttl-seconds: 2
      max-size: 1000000
    state:
      ttl-hours: 2
      max-size: 200000
    enrichment:
      db-csv-path: classpath:db/aircraft.csv
      refresh-interval-seconds: 600
      image-url-template: https://images.planespotters.net/{icao}.jpg
      planespotters:
        enabled: false
        base-url: https://api.planespotters.net/pub/photos/hex
        timeout-millis: 700
        cache-ttl-minutes: 30
        cache-max-size: 100000
  validation:
    max-speed-kmh: 1200.0
