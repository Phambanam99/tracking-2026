name: security

on:
  pull_request:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Dependency check (placeholder)
        run: ./gradlew dependencies
