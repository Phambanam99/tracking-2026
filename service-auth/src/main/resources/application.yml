spring:
  application:
    name: service-auth

logging:
  structured:
    format:
      console: logstash

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms,100ms,250ms,500ms,1s,2s

auth:
  internal-api-key: ${AUTH_INTERNAL_API_KEY:tracking-internal-key-2026}
  token-hash-pepper: ${AUTH_TOKEN_HASH_PEPPER:tracking-pepper-2026-very-strong}
  jwt:
    master-key: ${AUTH_JWT_MASTER_KEY:tracking-master-key-2026-32chars-long!}
    max-retained-keys: ${AUTH_JWT_MAX_RETAINED_KEYS:5}
  bootstrap-admin:
    enabled: ${AUTH_BOOTSTRAP_ADMIN_ENABLED:false}
    username: ${AUTH_BOOTSTRAP_ADMIN_USERNAME:}
    email: ${AUTH_BOOTSTRAP_ADMIN_EMAIL:}
    password: ${AUTH_BOOTSTRAP_ADMIN_PASSWORD:}
