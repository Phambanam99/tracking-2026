server:
  port: ${SERVER_PORT:8081}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tracking}
    username: ${SPRING_DATASOURCE_USERNAME:tracking}
    password: ${SPRING_DATASOURCE_PASSWORD:tracking}
    hikari:
      auto-commit: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
  flyway:
    baseline-on-migrate: true
    baseline-version: 5
  jpa:
    hibernate:
      ddl-auto: validate

auth:
  bootstrap-admin:
    enabled: ${AUTH_BOOTSTRAP_ADMIN_ENABLED:true}
    username: ${AUTH_BOOTSTRAP_ADMIN_USERNAME:admin}
    email: ${AUTH_BOOTSTRAP_ADMIN_EMAIL:admin@tracking.local}
    password: ${AUTH_BOOTSTRAP_ADMIN_PASSWORD:Admin@12345678}
