spring:
  application:
    name: service-broadcaster
  jackson:
    deserialization:
      fail-on-unknown-properties: false
  kafka:
    bootstrap-servers: ${TRACKING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

logging:
  structured:
    format:
      console: logstash

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
        ws.push.latency: true
      slo:
        http.server.requests: 50ms,100ms,250ms,500ms,1s,2s
        ws.push.latency: 5ms,10ms,25ms,50ms,100ms,250ms

tracking:
  features:
    ship:
      enabled: ${TRACKING_FEATURES_SHIP_ENABLED:false}
  kafka:
    topics:
      live: live-adsb
      liveAis: ${TRACKING_KAFKA_TOPICS_LIVE_AIS:live-ais}
      authRevocation: auth-revocation
  broadcaster:
    ship:
      consumer-enabled: ${TRACKING_BROADCASTER_SHIP_CONSUMER_ENABLED:false}
    ws:
      allowed-origin-patterns:
        - ${BROADCASTER_ALLOWED_ORIGIN:http://localhost:5173}
      max-viewport-updates-per-minute: 10
    consumer:
      group-id: service-broadcaster-v1
      auto-offset-reset: latest
      max-poll-records: 500
      retry:
        backoff-millis: 1000
        max-attempts: 3
      auth-revocation-group: ${spring.application.name}-${random.uuid}
    cleanup:
      interval-millis: 30000
      stale-timeout-millis: 300000
    security:
      fail-closed: true
      jwt-issuer: ${AUTH_JWT_ISSUER:tracking-auth}
      jwks-uri: ${AUTH_JWKS_URI:http://service-auth:8081/api/v1/auth/.well-known/jwks.json}
      jwks-refresh-interval-millis: 300000
      jwks-connect-timeout-millis: 300
      jwks-read-timeout-millis: 1000
      access-token-ttl-seconds: 900
      revocation-user-ttl-seconds: 900
