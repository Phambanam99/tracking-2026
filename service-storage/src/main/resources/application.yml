spring:
  application:
    name: service-storage
  flyway:
    create-schemas: true
    default-schema: storage
    locations: classpath:db/migration
    schemas: storage
    table: flyway_schema_history_storage
  jackson:
    deserialization:
      fail-on-unknown-properties: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tracking}
    username: ${SPRING_DATASOURCE_USERNAME:tracking}
    password: ${SPRING_DATASOURCE_PASSWORD:tracking}
    hikari:
      schema: storage
  kafka:
    bootstrap-servers: ${TRACKING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      enable-auto-commit: false
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      max-poll-records: ${tracking.storage.batch.max-size:5000}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

logging:
  structured:
    format:
      console: logstash

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        tracking.storage.batch.latency: true
      slo:
        tracking.storage.batch.latency: 50ms,100ms,250ms,500ms,1s,2s

tracking:
  features:
    ship:
      enabled: ${TRACKING_FEATURES_SHIP_ENABLED:false}
  kafka:
    topics:
      live: live-adsb
      historical: historical-adsb
      liveAis: ${TRACKING_KAFKA_TOPICS_LIVE_AIS:live-ais}
      historicalAis: ${TRACKING_KAFKA_TOPICS_HISTORICAL_AIS:historical-ais}
      storageDlq: storage-dlq
  storage:
    ship:
      consumer-enabled: ${TRACKING_STORAGE_SHIP_CONSUMER_ENABLED:false}
    consumer:
      group-id: service-storage-v1
      concurrency: 4
      poll-timeout-millis: 5000
      retry:
        backoff-millis: 1000
        max-attempts: 3
    batch:
      max-size: 5000
      flush-interval-millis: 5000
    buffer:
      max-capacity: 100000
      pause-threshold: 90000
      resume-threshold: 50000
    retry:
      delays-millis: 0,1000,3000
    dlq:
      publish-timeout-millis: 1000
